packet_root: .GOV/work_packets/
archive_root: .GOV/archive/work_packets/
status_model:
  - STUB
  - READY_FOR_DEV
  - IN_PROGRESS
  - BLOCKED
  - MERGE_PENDING
  - VALIDATED
  - FAIL
  - OUTDATED_ONLY
  - ABANDONED
  - SUPERSEDED
profile_model: [TRACKED, EXPANDED]
rules:
  - id: FF-TASKBOARD-RULE-001
    statement: Every indexed work packet has one stable wp_id and one packet path.
  - id: FF-TASKBOARD-RULE-002
    statement: At most one non-superseded packet revision may be active for a base_wp_id.
  - id: FF-TASKBOARD-RULE-003
    statement: STUB is planning state and does not authorize product implementation.
  - id: FF-TASKBOARD-RULE-004
    statement: The taskboard stores only the packet index and active focus; packet.json is authoritative for lifecycle, branch, scope, acceptance, blockers, proof, and next action.
  - id: FF-TASKBOARD-RULE-005
    statement: MERGE_PENDING means acceptance passed but the approved closure is not yet proven contained in main.
  - id: FF-TASKBOARD-RULE-006
    statement: VALIDATED requires the approved closure commit to be mechanically verified as contained in main.
  - id: FF-TASKBOARD-RULE-007
    statement: Do not maintain derived counts, copied packet fields, or Markdown task-state projections.
  - id: FF-TASKBOARD-RULE-008
    statement: Superseded packet history is archived and never deleted.
current_focus:
  statement: Implement the Phase 0 executable-gate bootstrap; later Phase 0 packets remain non-authorizing stubs until individually promoted.
