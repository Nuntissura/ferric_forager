rules:
  - id: FF-TASKBOARD-RULE-001
    statement: Every indexed work packet has one stable wp_id and one stable base_wp_id.
  - id: FF-TASKBOARD-RULE-002
    statement: At most one non-superseded packet revision may be active for a base_wp_id.
  - id: FF-TASKBOARD-RULE-003
    statement: STUB is planning state and does not authorize product implementation.
  - id: FF-TASKBOARD-RULE-004
    statement: READY_FOR_DEV requires a signed packet and completed research-backed refinement.
  - id: FF-TASKBOARD-RULE-005
    statement: MERGE_PENDING means validation passed but the approved closure is not yet proven contained in main.
  - id: FF-TASKBOARD-RULE-006
    statement: VALIDATED requires the approved closure commit to be verified as contained in main.
  - id: FF-TASKBOARD-RULE-007
    statement: Canonical YAML state is updated directly; no Markdown task-state projection is maintained.
  - id: FF-TASKBOARD-RULE-008
    statement: Superseded packet history is archived and never deleted.
current_focus:
  statement: Establish project governance and activate the first Phase 0 work packet before product implementation.
