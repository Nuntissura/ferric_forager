    statement: Product runtime code under product/ MUST NOT depend on .GOV/ at runtime.
  - id: FF-BOUNDARY-RUNTIME-DEPENDENCY-001
    statement: Production implementation is Rust with supervised FFmpeg and ffprobe; any other runtime or native dependency requires explicit Operator approval.
