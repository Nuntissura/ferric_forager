[workspace]
members = [
    "tools/fforager-xtask",
    "../product/crates/fforager-contracts",
    "../product/crates/fforager-diagnostics-contract",
    "../product/crates/fforager-core",
    "crates/fforager-testkit",
]
default-members = [
    "tools/fforager-xtask",
    "../product/crates/fforager-contracts",
    "../product/crates/fforager-diagnostics-contract",
    "../product/crates/fforager-core",
    "crates/fforager-testkit",
]
resolver = "3"

[workspace.package]
edition = "2024"
rust-version = "1.97.1"
license = "MIT OR Apache-2.0"
publish = false

[workspace.dependencies]
cargo_metadata = { version = "=0.23.1", default-features = false }
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.150"
saphyr = { version = "=0.0.11", default-features = false }
sha2 = { version = "=0.11.0", default-features = false }
toml = "=1.1.3"

[workspace.lints.rust]
unsafe_code = "forbid"
missing_debug_implementations = "warn"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }

[profile.dev]
debug = 1
incremental = false

[profile.test]
debug = 1
incremental = false

[profile.release]
codegen-units = 1
lto = "thin"
strip = "debuginfo"
