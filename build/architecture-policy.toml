schema_id = "ff.architecture_policy@2"
file_id = "FF-GOV-BUILD-ARCH-POLICY-001"
schema_version = "2.0.0"
accepted_design_decision_ids = ["FF-BUILD-036", "FF-BUILD-077"]
workspace_manifest = "build/Cargo.toml"
workspace_root = "build"
target_directory = "build/target"
root_toolchain_selector = "rust-toolchain.toml"
governance_root = ".GOV"
product_root = "product"
build_root = "build"
exception_authority = ".GOV/rules/build-rules.yaml"
exception_decision_ids = []
unsafe_policy = "forbid_in_workspace_members"
unsafe_exception_authority = ".GOV/rules/build-rules.yaml#exception_authority"
unsafe_decision_ids = []
internal_edge_default = "deny"
forbidden_layer_edges = ["engine->frontend", "engine->adapter", "engine->watcher", "adapter->adapter", "product->watcher", "watcher->engine", "normal_or_build:product->testkit"]
forbidden_product_runtime_roots = [".GOV", "build"]
allowed_runtime_or_native_dependencies = ["FFmpeg", "ffprobe"]
approved_transitive_build_packages = ["camino@1.2.4", "libc@0.2.186", "num-traits@0.2.19", "proc-macro2@1.0.107", "quote@1.0.47", "serde@1.0.228", "serde_core@1.0.228", "serde_json@1.0.150", "thiserror@2.0.19", "zmij@1.0.23"]
approved_transitive_proc_macros = ["serde_derive@1.0.228", "thiserror-impl@2.0.19"]

[[members]]
name = "fforager-xtask"
manifest = "build/tools/fforager-xtask/Cargo.toml"
source_root = "build/tools/fforager-xtask/src"
layer = "build_tooling"
artifact_role = "non_shipped_gate_runner"
shipped = false
test_only = false
publish_allowed = false
allowed_internal_dependencies = []
split_trigger = "FF-BUILD-036"
feature_owner = "WP-FF-003-executable-gate-bootstrap-v1"
profile = "phase0_bootstrap"
removal_condition = "Replace only through a versioned gate-runner migration that preserves all report and proof contracts."
runtime_native_constraint_ref = "FF-START-BOUNDARY-001"
unsafe_policy_ref = "FF-BUILD-050"
exception_policy_ref = "FF-BUILD-052"

[[members]]
name = "fforager-contracts"
manifest = "product/crates/fforager-contracts/Cargo.toml"
source_root = "product/crates/fforager-contracts/src"
layer = "contracts"
artifact_role = "shipped_versioned_wire_contracts"
shipped = true
test_only = false
publish_allowed = false
allowed_internal_dependencies = []
split_trigger = "WP-FF-005-versioned-core-contracts-v1-AC-001"
feature_owner = "WP-FF-005-versioned-core-contracts-v1"
profile = "phase0_prerequisite_contracts"
removal_condition = "Replace only through a versioned contract migration with retained prior-version fixtures and conformance proof."
runtime_native_constraint_ref = "FF-START-BOUNDARY-001"
unsafe_policy_ref = "FF-BUILD-050"
exception_policy_ref = "FF-BUILD-052"

[[members]]
name = "fforager-diagnostics-contract"
manifest = "product/crates/fforager-diagnostics-contract/Cargo.toml"
source_root = "product/crates/fforager-diagnostics-contract/src"
layer = "contracts"
artifact_role = "shipped_bounded_diagnostic_contracts"
shipped = true
test_only = false
publish_allowed = false
allowed_internal_dependencies = []
split_trigger = "WP-FF-005-versioned-core-contracts-v1-AC-001"
feature_owner = "WP-FF-005-versioned-core-contracts-v1"
profile = "phase0_prerequisite_contracts"
removal_condition = "Replace only through a versioned diagnostic migration preserving bounded payload and prior-version conformance proof."
runtime_native_constraint_ref = "FF-START-BOUNDARY-001"
unsafe_policy_ref = "FF-BUILD-050"
exception_policy_ref = "FF-BUILD-052"

[[members]]
name = "fforager-core"
manifest = "product/crates/fforager-core/Cargo.toml"
source_root = "product/crates/fforager-core/src"
layer = "engine"
artifact_role = "shipped_deterministic_core_models"
shipped = true
test_only = false
publish_allowed = false
allowed_internal_dependencies = [{ package = "fforager-contracts", kinds = ["normal"], optional = false }]
split_trigger = "WP-FF-005-versioned-core-contracts-v1-AC-003"
feature_owner = "WP-FF-005-versioned-core-contracts-v1"
profile = "phase0_prerequisite_contracts"
removal_condition = "Replace only through a versioned deterministic-model migration with state, resource, durability, and replay proof."
runtime_native_constraint_ref = "FF-START-BOUNDARY-001"
unsafe_policy_ref = "FF-BUILD-050"
exception_policy_ref = "FF-BUILD-052"

[[members]]
name = "fforager-testkit"
manifest = "build/crates/fforager-testkit/Cargo.toml"
source_root = "build/crates/fforager-testkit/src"
layer = "testkit"
artifact_role = "non_shipped_contract_conformance_harness"
shipped = false
test_only = true
publish_allowed = false
allowed_internal_dependencies = [
  { package = "fforager-contracts", kinds = ["normal"], optional = false },
  { package = "fforager-diagnostics-contract", kinds = ["normal"], optional = false },
  { package = "fforager-core", kinds = ["normal"], optional = false },
]
split_trigger = "WP-FF-005-versioned-core-contracts-v1-AC-005"
feature_owner = "WP-FF-005-versioned-core-contracts-v1"
profile = "phase0_prerequisite_contracts"
removal_condition = "Remove only after every framed protocol consumer has equivalent shared prior/current and negative-path conformance proof."
runtime_native_constraint_ref = "FF-START-BOUNDARY-001"
unsafe_policy_ref = "FF-BUILD-050"
exception_policy_ref = "FF-BUILD-052"

[[dependency_decisions]]
name = "cargo_metadata"
version = "0.23.1"
consumer = "fforager-xtask"
runtime_class = "non_shipped_build_tooling"
purpose = "Consume Cargo metadata format 1 without a brittle hand-written JSON parser."
native = false
owner = "WP-FF-003-executable-gate-bootstrap"
allowed_consumers = ["fforager-xtask"]
reason = "The official structured Cargo graph surface avoids lossy cargo-tree text parsing."
removal_trigger = "Cargo exposes an equally stable std-only metadata interface or the gate runner is replaced through a validated migration."
approval_id = "WP-FF-003-executable-gate-bootstrap-v1-AC-002"
features = []
default_features = false

[[dependency_decisions]]
name = "serde_json"
version = "1.0.150"
consumer = "fforager-testkit"
runtime_class = "non_shipped_test_tooling"
purpose = "Load and validate canonical contract inventory and cross-version JSON fixtures."
native = false
owner = "WP-FF-005-versioned-core-contracts"
allowed_consumers = ["fforager-testkit"]
reason = "The conformance harness must replay the same JSON artifacts used by shipped contract readers."
removal_trigger = "All registered wire contracts migrate away from JSON through accepted compatibility fixtures."
approval_id = "WP-FF-005-versioned-core-contracts-v1-AC-005"
features = []
default_features = true

[[dependency_decisions]]
name = "serde"
version = "1.0.228"
consumer = "fforager-contracts"
runtime_class = "shipped_rust_product"
purpose = "Serialize and deserialize explicit versioned wire DTOs."
native = false
owner = "WP-FF-005-versioned-core-contracts"
allowed_consumers = ["fforager-contracts"]
reason = "The contract boundary requires a mature typed serializer with deny-unknown-fields and exact pinned behavior."
removal_trigger = "All versioned wire contracts migrate through accepted fixtures to an equally strict serializer."
approval_id = "WP-FF-005-versioned-core-contracts-v1-AC-001"
features = ["derive"]
default_features = true

[[dependency_decisions]]
name = "serde_json"
version = "1.0.150"
consumer = "fforager-contracts"
runtime_class = "shipped_rust_product"
purpose = "Encode and decode bounded JSON wire envelopes and fixture payloads."
native = false
owner = "WP-FF-005-versioned-core-contracts"
allowed_consumers = ["fforager-contracts"]
reason = "The accepted WP-005 wire fixtures and framing contract use JSON payloads."
removal_trigger = "The wire format migrates through a versioned compatibility plan and retained prior-version fixtures."
approval_id = "WP-FF-005-versioned-core-contracts-v1-AC-001"
features = []
default_features = true

[[dependency_decisions]]
name = "serde"
version = "1.0.228"
consumer = "fforager-diagnostics-contract"
runtime_class = "shipped_rust_product"
purpose = "Serialize and deserialize bounded versioned diagnostic DTOs."
native = false
owner = "WP-FF-005-versioned-core-contracts"
allowed_consumers = ["fforager-diagnostics-contract"]
reason = "Diagnostic producers and consumers require a shared strict typed contract."
removal_trigger = "All diagnostic contracts migrate through accepted fixtures to an equally strict serializer."
approval_id = "WP-FF-005-versioned-core-contracts-v1-AC-001"
features = ["derive"]
default_features = true

[[dependency_decisions]]
name = "serde_json"
version = "1.0.150"
consumer = "fforager-diagnostics-contract"
runtime_class = "shipped_rust_product"
purpose = "Encode and decode bounded diagnostic payloads and fixtures."
native = false
owner = "WP-FF-005-versioned-core-contracts"
allowed_consumers = ["fforager-diagnostics-contract"]
reason = "The accepted diagnostic wire representation and conformance fixtures use JSON."
removal_trigger = "The diagnostic wire format migrates through a versioned compatibility plan and retained prior-version fixtures."
approval_id = "WP-FF-005-versioned-core-contracts-v1-AC-001"
features = []
default_features = true

[[dependency_decisions]]
name = "serde"
version = "1.0.228"
consumer = "fforager-xtask"
runtime_class = "non_shipped_build_tooling"
purpose = "Strict typed policy and report serialization."
native = false
owner = "WP-FF-003-executable-gate-bootstrap"
allowed_consumers = ["fforager-xtask"]
reason = "Typed deny-unknown-fields schemas are required for fail-closed project policy parsing."
removal_trigger = "All governed policy and report surfaces are removed or migrate to an equally strict approved serializer."
approval_id = "WP-FF-003-executable-gate-bootstrap-v1-AC-002"
features = ["derive"]
default_features = true

[[dependency_decisions]]
name = "serde_json"
version = "1.0.150"
consumer = "fforager-xtask"
runtime_class = "non_shipped_build_tooling"
purpose = "Parse Cargo, packet, and report JSON."
native = false
owner = "WP-FF-003-executable-gate-bootstrap"
allowed_consumers = ["fforager-xtask"]
reason = "Cargo metadata, packet contracts, and gate reports use JSON as their accepted machine-readable format."
removal_trigger = "Every governed JSON producer and consumer migrates through a versioned accepted contract."
approval_id = "WP-FF-003-executable-gate-bootstrap-v1-AC-002"
features = []
default_features = true

[[dependency_decisions]]
name = "saphyr"
version = "0.0.11"
consumer = "fforager-xtask"
runtime_class = "non_shipped_build_tooling"
purpose = "Parse governance YAML fail-closed before consuming build rules or active task state."
native = false
owner = "WP-FF-003-executable-gate-bootstrap"
allowed_consumers = ["fforager-xtask"]
reason = "A maintained YAML 1.2 parser is safer and smaller than inventing a project-local parser for authoritative governance files."
removal_trigger = "Governance authority migrates away from YAML or Rust gains an approved equivalent parser already present in the workspace."
approval_id = "WP-FF-003-executable-gate-bootstrap-v2-AC-003"
features = []
default_features = false

[[dependency_decisions]]
name = "sha2"
version = "0.11.0"
consumer = "fforager-xtask"
runtime_class = "non_shipped_build_tooling"
purpose = "Verify SHA-256 identities for host-installed validation executables."
native = false
owner = "WP-FF-003-executable-gate-bootstrap"
allowed_consumers = ["fforager-xtask"]
reason = "FF-BUILD-047 requires exact checksum evidence for tools not owned by the pinned Rust toolchain or workspace lockfile."
removal_trigger = "All validation executables are supplied through an independently verified toolchain or a standard-library SHA-256 implementation becomes available."
approval_id = "WP-FF-003-executable-gate-bootstrap-v2-AC-003"
features = []
default_features = false

[[dependency_decisions]]
name = "toml"
version = "1.1.3"
consumer = "fforager-xtask"
runtime_class = "non_shipped_build_tooling"
purpose = "Strict parsing of project-owned TOML policy."
native = false
owner = "WP-FF-003-executable-gate-bootstrap"
allowed_consumers = ["fforager-xtask"]
reason = "Cargo and project build policies use TOML and must be parsed semantically rather than through lexical matching."
removal_trigger = "All governed TOML policy migrates through a versioned accepted contract."
approval_id = "WP-FF-003-executable-gate-bootstrap-v1-AC-002"
features = []
default_features = true
